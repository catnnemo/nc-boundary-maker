<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nc-boundary-maker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f7f3;
    --ink: #0f1f17;
    --accent: #30bf76;
    --panel: #f8fcfa;
    --border: #b0d9c2;
  }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--border);
    background: var(--panel);
    z-index: 1000;
    flex-shrink: 0;
  }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
  }
  .title-block p {
    font-size: 0.68rem;
    color: #888;
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .controls { display: flex; align-items: center; gap: 12px; }
  #selection-info { font-size: 0.75rem; color: #666; letter-spacing: 0.03em; }
  #selection-info span { color: var(--accent); font-weight: 500; }
  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    padding: 8px 16px;
    transition: all 0.15s ease;
  }
  button:hover { border-color: var(--ink); background: #e4f4ec; }
  #download-btn { background: var(--accent); color: white; border-color: var(--accent); }
  #download-btn:hover { background: #229957; border-color: #229957; }
  #download-btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
  #map { flex: 1; width: 100%; }
  .county-tooltip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 0;
    padding: 4px 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
  .leaflet-tooltip-top.county-tooltip::before { border-top-color: var(--ink); }
  .leaflet-container { outline: none; }
  .leaflet-interactive:focus { outline: none; }
  #selected-list {
    position: absolute;
    bottom: 24px;
    left: 24px;
    z-index: 1000;
    background: var(--panel);
    border: 1.5px solid var(--border);
    padding: 12px 16px;
    max-width: 320px;
    display: none;
  }
  #selected-list h3 {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-bottom: 8px;
  }
  #selected-list ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  #selected-list ul li {
    font-size: 0.7rem;
    background: rgba(48,191,118,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 2px 7px;
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    z-index: 2000;
  }
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1>nc-boundary-maker</h1>
    <p>Click counties to select &mdash; download as GeoJSON</p>
  </div>
  <div class="controls">
    <div id="selection-info"><span id="count">0</span> counties selected</div>
    <button id="clear-btn">Clear</button>
    <button id="download-btn" disabled>Download GeoJSON</button>
  </div>
</header>
<div id="map"><div id="loading">Loading counties...</div></div>
<div id="selected-list">
  <h3>Selected Counties</h3>
  <ul id="county-tags"></ul>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<script>
const selected = new Set();
const map = L.map('map', { zoomControl: true, attributionControl: false });
map.fitBounds([[33.7, -84.4], [36.6, -75.3]]);

function getStyle(feature) {
  const sel = selected.has(feature.properties.County);
  return {
    fillColor: sel ? '#30bf76' : '#c2ddd0',
    fillOpacity: sel ? 0.45 : 0.3,
    color: sel ? '#229957' : '#7aaa90',
    weight: sel ? 2 : 1,
  };
}

function updateUI() {
  const count = selected.size;
  document.getElementById('count').textContent = count;
  document.getElementById('download-btn').disabled = count === 0;
  const list = document.getElementById('selected-list');
  list.style.display = count > 0 ? 'block' : 'none';
  document.getElementById('county-tags').innerHTML =
    [...selected].sort().map(c => '<li>' + c + '</li>').join('');
}

let geojsonLayer;
let geojsonData;

function initMap(data) {
  geojsonData = data;
  document.getElementById('loading').remove();

  function onEachFeature(feature, layer) {
    const name = feature.properties.County;
    layer.bindTooltip(name, { className: 'county-tooltip', sticky: true, offset: [10, 0] });

    layer.on('click', () => {
      selected.has(name) ? selected.delete(name) : selected.add(name);
      layer.setStyle(getStyle(feature));
      updateUI();
    });

    layer.on('mouseover', function() {
      if (!selected.has(name)) layer.setStyle({ fillOpacity: 0.55, fillColor: '#9dcbb5' });
    });

    layer.on('mouseout', function() {
      layer.setStyle(getStyle(feature));
    });
  }

  geojsonLayer = L.geoJSON(data, { style: getStyle, onEachFeature }).addTo(map);
}

// Load GeoJSON from repo
fetch('nc_counties.geojson')
  .then(r => {
    if (!r.ok) throw new Error('Failed to load nc_counties.geojson');
    return r.json();
  })
  .then(initMap)
  .catch(err => {
    document.getElementById('loading').textContent = 'Error loading counties: ' + err.message;
  });

document.getElementById('clear-btn').addEventListener('click', () => {
  selected.clear();
  if (geojsonLayer) geojsonLayer.eachLayer(l => l.setStyle(getStyle(l.feature)));
  updateUI();
});

document.getElementById('download-btn').addEventListener('click', () => {
  const features = geojsonData.features.filter(f => selected.has(f.properties.County));

  // Dissolve all selected counties into a single polygon using Turf.js union
  let dissolved = features[0];
  for (let i = 1; i < features.length; i++) {
    dissolved = turf.union(dissolved, features[i]);
  }
  dissolved.properties = { counties: [...selected].sort().join(', ') };

  const output = { type: 'FeatureCollection', features: [dissolved] };
  const blob = new Blob([JSON.stringify(output)], { type: 'application/geo+json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = 'nc_counties_' + ts + '.geojson';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
