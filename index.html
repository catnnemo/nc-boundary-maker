<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NC County Merger</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f0e8;
    --ink: #1a1a1a;
    --accent: #c0392b;
    --panel: #fffdf8;
    --border: #c8bfae;
  }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--border);
    background: var(--panel);
    z-index: 1000;
    flex-shrink: 0;
  }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
  }
  .title-block p {
    font-size: 0.68rem;
    color: #888;
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .controls { display: flex; align-items: center; gap: 12px; }
  #selection-info { font-size: 0.75rem; color: #666; letter-spacing: 0.03em; }
  #selection-info span { color: var(--accent); font-weight: 500; }
  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    padding: 8px 16px;
    transition: all 0.15s ease;
  }
  button:hover { border-color: var(--ink); background: #f0ebe0; }
  #download-btn { background: var(--accent); color: white; border-color: var(--accent); }
  #download-btn:hover { background: #a93226; border-color: #a93226; }
  #download-btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
  #map { flex: 1; width: 100%; }
  .county-tooltip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 0;
    padding: 4px 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
  .leaflet-tooltip-top.county-tooltip::before { border-top-color: var(--ink); }
  #selected-list {
    position: absolute;
    bottom: 24px;
    left: 24px;
    z-index: 1000;
    background: var(--panel);
    border: 1.5px solid var(--border);
    padding: 12px 16px;
    max-width: 320px;
    display: none;
  }
  #selected-list h3 {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-bottom: 8px;
  }
  #selected-list ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  #selected-list ul li {
    font-size: 0.7rem;
    background: rgba(192,57,43,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 2px 7px;
  }
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1>NC County Merger</h1>
    <p>Click counties to select &mdash; download as GeoJSON</p>
  </div>
  <div class="controls">
    <div id="selection-info"><span id="count">0</span> counties selected</div>
    <button id="clear-btn">Clear</button>
    <button id="download-btn" disabled>Download GeoJSON</button>
  </div>
</header>
<div id="map"></div>
<div id="selected-list">
  <h3>Selected Counties</h3>
  <ul id="county-tags"></ul>
</div>

const selected = new Set();
const map = L.map('map', { zoomControl: true, attributionControl: false });
map.fitBounds([[33.7, -84.4], [36.6, -75.3]]);

function getStyle(feature) {
  const sel = selected.has(feature.properties.County);
  return {
    fillColor: sel ? '#c0392b' : '#d2c8b9',
    fillOpacity: sel ? 0.45 : 0.3,
    color: sel ? '#c0392b' : '#8a7e6e',
    weight: sel ? 2 : 1,
  };
}

function updateUI() {
  const count = selected.size;
  document.getElementById('count').textContent = count;
  document.getElementById('download-btn').disabled = count === 0;
  const list = document.getElementById('selected-list');
  list.style.display = count > 0 ? 'block' : 'none';
  document.getElementById('county-tags').innerHTML =
    [...selected].sort().map(c => '<li>' + c + '</li>').join('');
}

let geojsonLayer;

function onEachFeature(feature, layer) {
  const name = feature.properties.County;
  layer.bindTooltip(name, { className: 'county-tooltip', sticky: true, offset: [10, 0] });

  layer.on('click', () => {
    selected.has(name) ? selected.delete(name) : selected.add(name);
    layer.setStyle(getStyle(feature));
    updateUI();
  });

  layer.on('mouseover', function() {
    if (!selected.has(name)) layer.setStyle({ fillOpacity: 0.55, fillColor: '#a89880' });
  });

  layer.on('mouseout', function() {
    layer.setStyle(getStyle(feature));
  });
}

geojsonLayer = L.geoJSON(GEOJSON, { style: getStyle, onEachFeature }).addTo(map);

document.getElementById('clear-btn').addEventListener('click', () => {
  selected.clear();
  geojsonLayer.eachLayer(l => l.setStyle(getStyle(l.feature)));
  updateUI();
});

document.getElementById('download-btn').addEventListener('click', () => {
  const features = GEOJSON.features.filter(f => selected.has(f.properties.County));
  const allCoords = [];
  features.forEach(f => {
    if (f.geometry.type === 'Polygon') allCoords.push(f.geometry.coordinates);
    else f.geometry.coordinates.forEach(c => allCoords.push(c));
  });
  const output = {
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      geometry: { type: 'MultiPolygon', coordinates: allCoords },
      properties: { counties: [...selected].sort().join(', ') }
    }]
  };
  const blob = new Blob([JSON.stringify(output)], { type: 'application/geo+json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = 'nc_counties_' + ts + '.geojson';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
